<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]>      <html class="no-js"> <![endif]-->
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Music Player (Prototype)</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!--Core-CSS-->
        <link rel="stylesheet" href="assets/css/style.css"/>
    </head>
    <body>
        <!--[if lt IE 7]>
            <p class="browsehappy">You are using an <strong>outdated</strong> browser. Please <a href="#">upgrade your browser</a> to improve your experience.</p>
        <![endif]-->
        <div class="background">
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>  
            <div class="shape"></div>
            <div class="shape"></div>
            <div class="shape"></div>  
            <div class="shape"></div>
            <div class="shape"></div> 
        </div><!--background-->        
        <div class="app">
            <div id="music-player">
                <header id="app-header">
                    <p id="time"></p><!--time-->
                    <ul id="ui-icons"></ul><!--ui-icons-->
                </header>  
                <main>
                    <header id="player-header">
                        <button aria-label="Info"></button>
                        <h1 id="header-title"></h1><!--header-title-->
                        <button aria-label="Playlist"></button>
                    </header>
                    <section id="player-body">
                        <div id="current-song">
                            <img id="album-cover-art" alt="Cover Art For Current Song"/>
                            <button aria-label="Shuffle"></button>
                            <button aria-label="Repeat"></button>
                        </div><!--current-song-->
                        <div id="song-info" aria-live="polite">
                            <h2 id="song-name"></h2><!--song-name-->
                            <p id="song-artist"></p><!--song-artist-->
                        </div><!--song-info-->
                        <!--audio-visualizer-->
                        <div id="audio-visualizer"></div><!--audio-visualizer-->
                        <div id="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div><!--progress-bar-->
                    </section>
                </main>
                <footer>
                    <nav id="player-controls" aria-label="Music Controls" role="navigation">
                        <button aria-label="Previous"></button>
                        <button aria-label="Play"></button>
                        <button aria-label="Next"></button>
                    </nav><!--player-controls-->
                </footer>
            </div><!--music-player-->
            <!--playlist-->
            <div id="playlist">
                <div id="playlist-header">
                    <button aria-label="Back To Main Player"></button>
                    <h1 id="playlist-header-title"></h1><!--playlist-header-title-->
                </div><!--playlist-header-->  
                <img id="playlist-cover-art" alt="Cover Art For Current Song"/>            
                <!--track-list-->      
                <!--insert-with-javascript-->
                <ul id="track-list" role="list">
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                    <li role="listitem"></li>
                </ul><!--track-list-->
            </div><!--playlist-->
        </div><!--app-->
    </body>
</html>
